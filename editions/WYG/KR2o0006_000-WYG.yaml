body:
  text: 通鑑問疑史評類提要臣等謹案通鑑問疑一卷宋劉羲仲撰羲仲筠州人秘書丞恕之長子宋史附見恕傳末但稱恕死後七年通鑑成追録其勞官其子羲仲案宋史原本作義仲癸辛雜識亦作義仲均傳寫之誤今改正為郊社齋郎其始末則未詳也史稱司馬光編次資治通鑑英宗命自擇館閣英才共修之光對曰館閣文學之士誠多至於専精史學臣得而知者惟劉恕耳即召為局僚遇史亊紛雜難治者輒以諉恕恕於魏晉以後事考證差謬最為精詳羲仲之書即裒録恕與光往還論難之詞據書末稱方今春秋尚廢況此書乎云云盖成于熙寧以後邵伯温聞見録稱通鑑以史記前後漢屬劉攽以唐逮五代屬范祖禹以三國歴九朝至隋屬恕故此書所論皆三國至南北朝事也凡所辨論皆極精核史所稱篤好史學自太史公所記下至周顯徳末私記雜説無所不覽上下數千載間鉅細之事如指諸掌者殆非虚語通鑑帝魏朱子修綱目改帝蜀講學家以為申眀大義上繼春秋今觀是書則恕嘗以蜀比東晉擬紹正統與光力爭而不從是不但習鑿齒劉知幾先有此説即修通鑑時亦未嘗無人議及矣末附羲仲與范祖禹一篇稱其父在書局止類事迹勒成長編其是非予奪之際一出君實筆削而羲仲不及見君實不備知凡例中是非予奪所以然之故范淳父亦嘗預修通鑑乃書所疑問焉所舉凡八事復載得祖禹答書具為剖析乃深悔其詰難之誤且自言恐復有小言破言小道害道如已之所云者故載之使後世有考焉其能顯先人之善而又不自諱其所失尤足見涑水之徒猶有先儒質直之遺也乾隆四十二年恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
